server:
  port: 8080

spring:
  application:
    name: eventflow-api

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:eventflow_db}
    username: ${DB_USER:eventflow_user}
    password: ${DB_PASSWORD:eventflow_pass}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:eventflow}
    password: ${RABBITMQ_PASSWORD:eventflow}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

eventflow:
  rabbitmq:
    exchange: eventflow.exchange
    queue: eventflow.events.queue
    dead-letter-exchange: eventflow.exchange.dlx
    dead-letter-queue: eventflow.events.dlq
    routing-key-pattern: "#"
  retry:
    max-attempts: 3
    initial-interval-ms: 500
    multiplier: 2.0
    max-interval-ms: 5000
  dedup:
    ttl-seconds: 86400
  rate-limit:
    max-events-per-window: 50
    window-seconds: 60
  cache:
    dashboard-stats-ttl-seconds: 5

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.eventflow: INFO
