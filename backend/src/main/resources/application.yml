server:
  port: 8080

spring:
  application:
    name: pulsequeue-api

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:pulsequeue_db}
    username: ${DB_USER:pulsequeue_user}
    password: ${DB_PASSWORD:pulsequeue_pass}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:pulsequeue}
    password: ${RABBITMQ_PASSWORD:pulsequeue}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

pulsequeue:
  rabbitmq:
    exchange: pulsequeue.exchange
    queue: pulsequeue.events.queue
    dead-letter-exchange: pulsequeue.exchange.dlx
    dead-letter-queue: pulsequeue.events.dlq
    routing-key-pattern: "#"
  retry:
    max-attempts: 3
    initial-interval-ms: 500
    multiplier: 2.0
    max-interval-ms: 5000
  dedup:
    ttl-seconds: 86400
  rate-limit:
    max-events-per-window: 50
    window-seconds: 60
  cache:
    dashboard-stats-ttl-seconds: 5
  security:
    api-key: ${API_KEY:pulsequeue-dev-key-change-me}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.pulsequeue: INFO
