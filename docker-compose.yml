services:
  db:
    image: postgres:16-alpine
    container_name: eventflow-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: eventflow_db
      POSTGRES_USER: eventflow_user
      POSTGRES_PASSWORD: eventflow_pass
    ports:
      - "5432:5432"
    volumes:
      - eventflow-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventflow_user -d eventflow_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: eventflow-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: eventflow
      RABBITMQ_DEFAULT_PASS: eventflow
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - eventflow-rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: eventflow-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    container_name: eventflow-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: eventflow_db
      DB_USER: eventflow_user
      DB_PASSWORD: eventflow_pass
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: eventflow
      RABBITMQ_PASSWORD: eventflow
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8080:8080"

  web:
    build: ./frontend
    container_name: eventflow-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3000:80"

  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: eventflow-prometheus
    restart: unless-stopped
    depends_on:
      - api
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - eventflow-prometheus-data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.2.0
    container_name: eventflow-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - eventflow-grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"

volumes:
  eventflow-db-data:
  eventflow-rabbitmq-data:
  eventflow-prometheus-data:
  eventflow-grafana-data:
