services:
  db:
    image: postgres:16-alpine
    container_name: pulsequeue-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: pulsequeue_db
      POSTGRES_USER: pulsequeue_user
      POSTGRES_PASSWORD: pulsequeue_pass
    ports:
      - "5432:5432"
    volumes:
      - pulsequeue-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulsequeue_user -d pulsequeue_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: pulsequeue-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: pulsequeue
      RABBITMQ_DEFAULT_PASS: pulsequeue
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - pulsequeue-rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pulsequeue-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    container_name: pulsequeue-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: pulsequeue_db
      DB_USER: pulsequeue_user
      DB_PASSWORD: pulsequeue_pass
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: pulsequeue
      RABBITMQ_PASSWORD: pulsequeue
      REDIS_HOST: redis
      REDIS_PORT: 6379
      API_KEY: ${API_KEY:-pulsequeue-dev-key-change-me}
    ports:
      - "8080:8080"

  web:
    build: ./frontend
    container_name: pulsequeue-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3000:80"

  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: pulsequeue-prometheus
    restart: unless-stopped
    depends_on:
      - api
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - pulsequeue-prometheus-data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.2.0
    container_name: pulsequeue-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - pulsequeue-grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"

volumes:
  pulsequeue-db-data:
  pulsequeue-rabbitmq-data:
  pulsequeue-prometheus-data:
  pulsequeue-grafana-data:
